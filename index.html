<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottery Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn">Dark Mode</button>
    </div>
    <div class="container">
        <h1>Lottery Number Generator</h1>
        <div class="lotto-numbers"></div>
        <button id="generator-btn">Generate Numbers</button>

        <div class="divider"></div>

        <section class="contact-section">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/xqegwbrn" method="POST" class="contact-form">
                <div class="form-group">
                    <input type="text" name="name" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <textarea name="message" rows="4" placeholder="Your Message" required></textarea>
                </div>
                <button type="submit" id="submit-btn">Send Message</button>
            </form>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
